<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline' https://fonts.googleapis.com; font-src {{cspSource}} https://fonts.gstatic.com data:; script-src {{cspSource}};" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConflictCraft</title>
  <link rel="stylesheet" href="{{styleUri}}" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-group">
        <svg class="brand-mark" viewBox="0 0 72 72" aria-hidden="true">
          <rect x="3.5" y="3.5" width="65" height="65" rx="14" />
          <path d="M24 22h25v8H32v12h14v8H24z" />
          <circle cx="53.5" cy="53.5" r="4.5" />
        </svg>
        <div class="brand">
          <h1>ConflictCraft</h1>
          <p>Deterministic Merge Workstation</p>
        </div>
      </div>
      <div class="actions">
        <button id="toggleExplainBtn">Explain</button>
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
        <button id="saveBtn">Save Result</button>
      </div>
    </header>

    <section class="summary" id="summary"></section>

    <main class="pane-grid">
      <section class="pane">
        <h2>
          <svg class="section-icon" viewBox="0 0 32 32" aria-hidden="true">
            <rect x="4.5" y="4.5" width="23" height="23" rx="4" />
            <path d="M10 12h12M10 17h12M10 22h7" />
          </svg>
          Base
        </h2>
        <textarea id="basePane" readonly></textarea>
      </section>
      <section class="pane">
        <h2>
          <svg class="section-icon" viewBox="0 0 32 32" aria-hidden="true">
            <rect x="4.5" y="4.5" width="23" height="23" rx="4" />
            <path d="M9 11h14M9 16h14M9 21h9" />
            <circle cx="24" cy="21" r="2.2" />
          </svg>
          Ours
        </h2>
        <textarea id="oursPane" readonly></textarea>
      </section>
      <section class="pane">
        <h2>
          <svg class="section-icon" viewBox="0 0 32 32" aria-hidden="true">
            <rect x="4.5" y="4.5" width="23" height="23" rx="4" />
            <path d="M10 10l12 12M22 10L10 22" />
          </svg>
          Theirs
        </h2>
        <textarea id="theirsPane" readonly></textarea>
      </section>
      <section class="pane">
        <h2>
          <svg class="section-icon" viewBox="0 0 32 32" aria-hidden="true">
            <rect x="4.5" y="4.5" width="23" height="23" rx="4" />
            <path d="M10 16h12M16 10v12" />
          </svg>
          Result
        </h2>
        <textarea id="resultPane"></textarea>
      </section>
    </main>

    <section class="rules">
      <h2>
        <svg class="section-icon" viewBox="0 0 32 32" aria-hidden="true">
          <rect x="4.5" y="4.5" width="23" height="23" rx="4" />
          <path d="M10 11h12M10 16h12M10 21h8" />
          <circle cx="22.5" cy="21" r="1.8" />
        </svg>
        Suggestions
      </h2>
      <div id="suggestionList"></div>
    </section>

    <section class="graph">
      <h2>
        <svg class="section-icon" viewBox="0 0 32 32" aria-hidden="true">
          <rect x="7.5" y="7.5" width="5" height="5" rx="1.2" />
          <rect x="19.5" y="7.5" width="5" height="5" rx="1.2" />
          <rect x="13.5" y="19.5" width="5" height="5" rx="1.2" />
          <path d="M12.5 10h7M16 12.5v7" />
        </svg>
        Conflict Graph Summary
      </h2>
      <div id="graphSummary"></div>
    </section>

    <section class="explain hidden" id="explainPanel">
      <h2>
        <svg class="section-icon" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="11" />
          <path d="M16 22v-2.3M14 13.8a2 2 0 1 1 2 2v1.2" />
        </svg>
        Explain Mode
      </h2>
      <div id="explainContent"></div>
    </section>

    <footer class="brand-footer">
      <span class="footer-label">made by</span>
      <span class="infiniware-logo" aria-label="Infiniware">
        <span class="logo-i">I</span><span class="logo-rest">nfiniware</span>
      </span>
    </footer>
  </div>

  <script src="{{scriptUri}}"></script>
</body>
</html>
