name: CI

on:
  push:
    branches:
      - main
      - branch-*
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure CMake
        run: cmake -S core -B core/build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ core
        run: cmake --build core/build --config Release

      - name: Run C++ tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir core/build --output-on-failure -C Release

      - name: Run C++ tests (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir core/build --output-on-failure

      - name: Install Python dependencies
        run: python -m pip install -r python_engine/requirements.txt

      - name: Run Python rule tests
        run: python -m pytest python_engine/tests

      - name: Build extension
        working-directory: vscode-extension
        run: |
          npm install
          npm run compile

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package
